name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Lint with ruff
        run: |
          uv run ruff check src tests
          uv run ruff format --check src tests

      - name: Type check with mypy
        run: uv run mypy src

      - name: Run unit tests
        run: uv run pytest -m "not spark and not integration" -v

      - name: Upload coverage
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  spark-tests:
    # The Spark tests need a real SparkSession. Ubuntu runners have a
    # working Hadoop, so PySpark + delta-spark run here without the
    # winutils.exe dance required on Windows. These tests exercise the
    # BronzeWriter MERGE semantics that the fast unit suite skips.
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python 3.11
        run: uv python install 3.11

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install dependencies (with Spark extra)
        run: uv sync --extra dev --extra spark

      - name: Run Spark tests
        run: uv run pytest -m spark --no-cov -v
